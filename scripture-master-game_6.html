<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マスター聖句ゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --dark: #1a1410; --panel: #2d2418;
    --panel-border: #4a3a20; --text: #f0e8d8; --text-dim: #a09070;
    --correct: #4a9960; --wrong: #993030; --blue: #4a7ab5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(74,122,181,.05) 0%, transparent 60%); }
  header { text-align:center; padding:2rem 1rem 1.5rem; border-bottom:1px solid var(--panel-border); background:linear-gradient(180deg,rgba(201,168,76,.08) 0%,transparent 100%); }
  header h1 { font-family:'Noto Serif JP',serif; font-size:clamp(1.4rem,4vw,2.2rem); color:var(--gold-light); letter-spacing:.05em; text-shadow:0 2px 20px rgba(201,168,76,.3); }
  header p { color:var(--text-dim); font-size:.85rem; margin-top:.4rem; }
  #menu { max-width:700px; margin:3rem auto; padding:0 1rem; display:flex; flex-direction:column; gap:1.2rem; }
  .menu-card { background:var(--panel); border:1px solid var(--panel-border); border-radius:12px; padding:1.6rem 1.8rem; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:1.2rem; }
  .menu-card:hover { border-color:var(--gold); background:rgba(201,168,76,.08); transform:translateY(-2px); box-shadow:0 8px 30px rgba(201,168,76,.1); }
  .menu-icon { font-size:2rem; width:3rem; text-align:center; flex-shrink:0; }
  .menu-text h2 { font-family:'Noto Serif JP',serif; font-size:1.1rem; color:var(--gold-light); margin-bottom:.3rem; }
  .menu-text p { font-size:.8rem; color:var(--text-dim); line-height:1.5; }
  #filter-section { max-width:700px; margin:2rem auto 0; padding:0 1rem; }
  .filter-label { font-size:.8rem; color:var(--text-dim); margin-bottom:.6rem; display:block; }
  .filter-btns { display:flex; flex-wrap:wrap; gap:.5rem; }
  .filter-btn { background:var(--panel); border:1px solid var(--panel-border); border-radius:20px; color:var(--text-dim); padding:.3rem .9rem; font-size:.78rem; cursor:pointer; transition:all .15s; font-family:'Noto Sans JP',sans-serif; }
  .filter-btn.active { background:rgba(201,168,76,.15); border-color:var(--gold); color:var(--gold-light); }
  #game { display:none; max-width:780px; margin:0 auto; padding:1.5rem 1rem 3rem; }
  .game-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:.5rem; }
  .back-btn { background:none; border:1px solid var(--panel-border); color:var(--text-dim); padding:.4rem .9rem; border-radius:20px; cursor:pointer; font-size:.8rem; transition:all .15s; font-family:'Noto Sans JP',sans-serif; }
  .back-btn:hover { border-color:var(--gold); color:var(--gold-light); }
  .game-title { font-family:'Noto Serif JP',serif; font-size:.95rem; color:var(--gold); }
  .score-display { font-size:.85rem; color:var(--text-dim); }
  .score-display span { color:var(--gold-light); font-weight:600; }
  .question-box { background:var(--panel); border:1px solid var(--panel-border); border-radius:14px; padding:1.6rem; margin-bottom:1.2rem; }
  .question-label { font-size:.7rem; color:var(--gold); letter-spacing:.1em; text-transform:uppercase; margin-bottom:.8rem; }
  .question-text { font-family:'Noto Serif JP',serif; font-size:clamp(.88rem,2.2vw,1rem); line-height:2; color:var(--text); }
  .question-ref { font-size:.76rem; color:var(--text-dim); margin-top:.8rem; font-style:italic; }
  .options { display:grid; gap:.7rem; }
  .option-btn { background:var(--panel); border:1px solid var(--panel-border); border-radius:10px; padding:.9rem 1.1rem; text-align:left; cursor:pointer; font-family:'Noto Serif JP',serif; font-size:clamp(.78rem,1.9vw,.9rem); color:var(--text); line-height:1.8; transition:all .15s; }
  .option-btn:hover:not(:disabled) { border-color:var(--gold); background:rgba(201,168,76,.06); }
  .option-btn.correct { border-color:var(--correct); background:rgba(74,153,96,.12); color:#7ecf9a; }
  .option-btn.wrong { border-color:var(--wrong); background:rgba(153,48,48,.12); color:#cf7e7e; }
  .option-btn:disabled { cursor:default; }
  .option-letter { display:inline-block; width:1.4rem; height:1.4rem; background:rgba(201,168,76,.15); border-radius:4px; font-size:.7rem; text-align:center; line-height:1.4rem; color:var(--gold); margin-right:.5rem; font-family:'Noto Sans JP',sans-serif; vertical-align:middle; flex-shrink:0; }
  .feedback { margin-top:.9rem; padding:.9rem 1.1rem; border-radius:10px; font-size:.84rem; line-height:1.7; display:none; }
  .feedback.show { display:block; }
  .feedback.correct-fb { background:rgba(74,153,96,.1); border:1px solid rgba(74,153,96,.4); color:#7ecf9a; }
  .feedback.wrong-fb { background:rgba(153,48,48,.1); border:1px solid rgba(153,48,48,.4); color:#cf7e7e; }
  .next-btn { display:none; margin-top:1rem; width:100%; background:linear-gradient(135deg,var(--gold) 0%,#a07830 100%); color:var(--dark); border:none; border-radius:10px; padding:.85rem; font-size:.92rem; font-weight:600; cursor:pointer; transition:opacity .2s; font-family:'Noto Sans JP',sans-serif; }
  .next-btn:hover { opacity:.85; }
  .next-btn.show { display:block; }
  .blank { color:var(--gold-light); border-bottom:2px solid var(--gold); padding:0 3px; font-weight:700; }
  .progress-wrap { height:4px; background:rgba(255,255,255,.08); border-radius:2px; margin-bottom:1.5rem; }
  .progress-bar { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:2px; transition:width .4s ease; }
  .match-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .match-col-label { font-size:.7rem; color:var(--gold); letter-spacing:.08em; margin-bottom:.5rem; text-transform:uppercase; }
  .match-item { background:var(--panel); border:1px solid var(--panel-border); border-radius:10px; padding:.75rem .9rem; cursor:pointer; font-family:'Noto Serif JP',serif; font-size:clamp(.73rem,1.7vw,.83rem); line-height:1.7; transition:all .15s; color:var(--text); margin-bottom:.5rem; }
  .match-item.ref-item { font-size:clamp(.75rem,1.8vw,.88rem); font-weight:700; color:var(--gold-light); }
  .match-item:hover:not(.matched):not(.selected) { border-color:var(--gold); background:rgba(201,168,76,.06); }
  .match-item.selected { border-color:var(--blue); background:rgba(74,122,181,.12); color:#8ab8e8; }
  .match-item.matched { border-color:var(--correct); background:rgba(74,153,96,.1); color:#7ecf9a; opacity:.7; cursor:default; }
  .match-item.error { border-color:var(--wrong); background:rgba(153,48,48,.1); animation:shake .4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  #result { display:none; max-width:500px; margin:3rem auto; padding:2.5rem 2rem; background:var(--panel); border:1px solid var(--panel-border); border-radius:16px; text-align:center; }
  #result h2 { font-family:'Noto Serif JP',serif; font-size:1.5rem; color:var(--gold-light); margin-bottom:1rem; }
  .result-score { font-size:3rem; font-weight:700; color:var(--gold); margin:1rem 0; }
  .result-msg { color:var(--text-dim); font-size:.9rem; margin-bottom:1.5rem; }
  .result-btn { background:linear-gradient(135deg,var(--gold) 0%,#a07830 100%); color:var(--dark); border:none; border-radius:10px; padding:.8rem 2rem; font-size:1rem; font-weight:600; cursor:pointer; margin:.4rem; font-family:'Noto Sans JP',sans-serif; }
  .result-btn.secondary { background:none; border:1px solid var(--panel-border); color:var(--text-dim); }
  @media(max-width:500px){ .match-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<header>
  <h1>📖 マスター聖句ゲーム</h1>
  <p>末日聖徒イエス・キリスト教会</p>
</header>

<div id="menu-section">
  <div id="filter-section">
    <span class="filter-label">聖典を選ぶ</span>
    <div class="filter-btns" id="filter-btns"></div>
  </div>
  <div id="menu">
    <div class="menu-card" onclick="startGame('identify')">
      <div class="menu-icon">📜</div>
      <div class="menu-text">
        <h2>モード①　聖句当てクイズ</h2>
        <p>聖句の冒頭が表示されます。4つの選択肢からどの参照箇所かを当てましょう。</p>
      </div>
    </div>
    <div class="menu-card" onclick="startGame('match')">
      <div class="menu-icon">🔗</div>
      <div class="menu-text">
        <h2>モード②　上の句・下の句</h2>
        <p>聖句の上の句が表示されます。5つの選択肢から正しい下の句を選びましょう。</p>
      </div>
    </div>
    <div class="menu-card" onclick="startGame('blank')">
      <div class="menu-icon">✏️</div>
      <div class="menu-text">
        <h2>モード③　虫食い問題</h2>
        <p>聖句の重要な言葉が空欄になっています。4つの選択肢から正しいものを選びましょう。</p>
      </div>
    </div>
  </div>
</div>

<div id="game">
  <div class="game-header">
    <button class="back-btn" onclick="showMenu()">← メニューに戻る</button>
    <div class="game-title" id="game-title"></div>
    <div class="score-display">正解: <span id="score">0</span> / <span id="total">0</span></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div id="game-content"></div>
</div>

<div id="result">
  <h2>結果発表</h2>
  <div class="result-score" id="result-score"></div>
  <div class="result-msg" id="result-msg"></div><br>
  <button class="result-btn" onclick="restartGame()">もう一度</button>
  <button class="result-btn secondary" onclick="showMenu()">メニューへ</button>
</div>

<script>

  BOOKS.forEach(b=>{const btn=document.createElement('button');btn.className='filter-btn'+(b===selectedFilter?' active':'');btn.textContent=b;btn.onclick=()=>{selectedFilter=b;document.querySelectorAll('.filter-btn').forEach(el=>el.classList.remove('active'));btn.classList.add('active');};c.appendChild(btn);});
}
function showMenu(){document.getElementById('menu-section').style.display='';document.getElementById('game').style.display='none';document.getElementById('result').style.display='none';}
function showResult(){
  document.getElementById('game').style.display='none';document.getElementById('menu-section').style.display='none';
  document.getElementById('result').style.display='block';
  const pct=Math.round(score/questions.length*100);
  document.getElementById('result-score').textContent=`${score} / ${questions.length}`;
  document.getElementById('result-msg').textContent=pct===100?'完璧です！素晴らしい！🌟':pct>=80?'大変よくできました！あともう少し！✨':pct>=60?'よくできました！引き続き練習しましょう。':'聖句を読み返して，また挑戦してみましょう。';
}
function restartGame(){startGame(currentMode);}
function updateProgress(){document.getElementById('progress-bar').style.width=(currentQ/questions.length*100)+'%';document.getElementById('score').textContent=score;document.getElementById('total').textContent=questions.length;}
function startGame(mode){
  currentMode=mode;currentQ=0;score=0;answered=false;
  const pool=getPool();
  if(pool.length<4){alert('この聖典には聖句が少なすぎます。「すべて」を選んでください。');return;}
  document.getElementById('menu-section').style.display='none';document.getElementById('result').style.display='none';document.getElementById('game').style.display='block';
  document.getElementById('game-title').textContent={identify:'📜 モード①　聖句当てクイズ',match:'🔗 モード②　上の句・下の句',blank:'✏️ モード③　虫食い問題'}[mode];
  if(mode==='identify') setupIdentify(pool);
  else if(mode==='match') setupMatch(pool);
  else setupBlank(pool);
}

// ── MODE 1 ──
function setupIdentify(pool){questions=shuffle(pool).slice(0,Math.min(10,pool.length));renderIdentify();}
function renderIdentify(){
  updateProgress();if(currentQ>=questions.length){showResult();return;}answered=false;
  const q=questions[currentQ],text=q.text;
  const chars=Math.max(15,Math.floor(text.length*(0.3+currentQ/questions.length*0.25)));
  const partial=text.slice(0,chars)+'……';
  const others=shuffle(SCRIPTURES.filter(s=>s.ref!==q.ref)).slice(0,3);
  const opts=shuffle([q,...others]);
  document.getElementById('game-content').innerHTML=`
    <div class="question-box">
      <div class="question-label">この聖句の参照箇所はどれ？（${currentQ+1} / ${questions.length}）</div>
      <div class="question-text">${partial}</div>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextIdentify()">次へ →</button>`;
  const letters=['Ａ','Ｂ','Ｃ','Ｄ'];
  const od=document.getElementById('options');
  opts.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="option-letter">${letters[i]}</span>${opt.ref}`;btn.onclick=()=>chooseIdentify(btn,opt.ref===q.ref,q);od.appendChild(btn);});
}
function chooseIdentify(btn,correct,q){
  if(answered)return;answered=true;
  document.querySelectorAll('.option-btn').forEach(b=>{b.disabled=true;if(b.textContent.includes(q.ref))b.classList.add('correct');});
  const fb=document.getElementById('feedback');
  if(correct){score++;btn.classList.add('correct');fb.className='feedback show correct-fb';fb.innerHTML='✓ 正解！<br><small style="opacity:.8">'+q.ref+'：「'+q.text+'」</small>';}
  else{btn.classList.add('wrong');fb.className='feedback show wrong-fb';fb.innerHTML='✗ 不正解。<br><small style="opacity:.8">正解：'+q.ref+'<br>「'+q.text+'」</small>';}
  document.getElementById('next-btn').classList.add('show');document.getElementById('score').textContent=score;
}
function nextIdentify(){currentQ++;renderIdentify();}

// ── MODE 2: 上の句・下の句 ──
function setupMatch(pool){
  // top/bottomが両方あるものだけ対象
  const eligible = pool.filter(s => s.top && s.bottom);
  questions = shuffle(eligible).slice(0, Math.min(10, eligible.length));
  renderMatch();
}
function renderMatch(){
  updateProgress();
  if(currentQ >= questions.length){ showResult(); return; }
  answered = false;
  const q = questions[currentQ];
  // 誤答4つ：他の聖句のbottomからランダムに選ぶ
  const wrongs = shuffle(SCRIPTURES.filter(s => s.ref !== q.ref && s.bottom)).slice(0, 4);
  const opts = shuffle([q, ...wrongs]);
  document.getElementById('game-content').innerHTML = `
    <div class="question-box">
      <div class="question-label">上の句に続く下の句はどれ？（${currentQ+1} / ${questions.length}）</div>
      <div style="font-size:.72rem;color:var(--text-dim);margin-bottom:.6rem;">${q.ref}</div>
      <div class="question-text">${q.top}</div>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextMatch()">次へ →</button>`;
  const letters=['Ａ','Ｂ','Ｃ','Ｄ','Ｅ'];
  const od = document.getElementById('options');
  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.bottom}`;
    btn.onclick = () => chooseMatch(btn, opt.ref === q.ref, q);
    od.appendChild(btn);
  });
}
function chooseMatch(btn, correct, q){
  if(answered) return; answered = true;
  // 正解ボタンを特定してハイライト
  document.querySelectorAll('.option-btn').forEach((b, idx) => {
    b.disabled = true;
  });
  // 正解は必ずbtnそのものか、別のボタンか
  const allBtns = Array.from(document.querySelectorAll('.option-btn'));
  // opts配列のindexはbtnのindexと一致しているので、正解ボタンは correct === true のとき btn自身
  const fb = document.getElementById('feedback');
  if(correct){
    score++; btn.classList.add('correct');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = '✓ 正解！<br><small style="opacity:.8">「' + q.top + q.bottom + '」</small>';
  } else {
    btn.classList.add('wrong');
    // 正解ボタンを探してハイライト（optsはshuffleされているので内容で照合）
    allBtns.forEach(b2 => {
      if(b2 !== btn && b2.textContent.slice(1).trim() === q.bottom) b2.classList.add('correct');
    });
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = '✗ 不正解。<br><small style="opacity:.8">正しい下の句：「' + q.bottom + '」</small>';
  }
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('score').textContent = score;
}
function nextMatch(){ currentQ++; renderMatch(); }

// ── MODE 3 ──
function setupBlank(pool){const eligible=pool.filter(s=>s.text.length>=25&&s.keys&&s.keys.length>0);questions=shuffle(eligible).slice(0,Math.min(10,eligible.length));renderBlank();}
function renderBlank(){
  updateProgress();if(currentQ>=questions.length){showResult();return;}answered=false;
  const q=questions[currentQ];
  // テキスト中に実際に含まれるキーワードのみ対象
  const validKeys=(q.keys||[]).filter(k=>q.text.includes(k));
  if(validKeys.length===0){currentQ++;renderBlank();return;}
  const target=validKeys[Math.floor(Math.random()*validKeys.length)];
  const blanked=q.text.replace(target,`<span class="blank">　　　　</span>`);
  // 誤選択肢：他の聖句のkeysから（targetと同程度の長さのものを優先）
  const pool2=[];
  SCRIPTURES.forEach(s=>{if(s.ref!==q.ref&&s.keys)(s.keys).forEach(k=>{if(k!==target&&k.length>=2)pool2.push(k);});});
  const wrongs=shuffle([...new Set(pool2)]).slice(0,3);
  const opts=shuffle([target,...wrongs.slice(0,3)]);
  document.getElementById('game-content').innerHTML=`
    <div class="question-box">
      <div class="question-label">空欄に入る言葉は？（${currentQ+1} / ${questions.length}）</div>
      <div class="question-text">${blanked}</div>
      <div class="question-ref">${q.ref}</div>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextBlank()">次へ →</button>`;
  const letters=['Ａ','Ｂ','Ｃ','Ｄ'];
  const od=document.getElementById('options');
  opts.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="option-letter">${letters[i]}</span>${opt}`;btn.onclick=()=>chooseBlank(btn,opt===target,target,q);od.appendChild(btn);});
}
function chooseBlank(btn,correct,target,q){
  if(answered)return;answered=true;
  document.querySelectorAll('.option-btn').forEach(b=>{b.disabled=true;const label=b.textContent.replace(/[ＡＢＣＤ]/,'').trim();if(label===target)b.classList.add('correct');});
  const fb=document.getElementById('feedback');
  if(correct){score++;btn.classList.add('correct');fb.className='feedback show correct-fb';fb.innerHTML='✓ 正解！「'+target+'」<br><small style="opacity:.8">'+q.text+'</small>';}
  else{btn.classList.add('wrong');fb.className='feedback show wrong-fb';fb.innerHTML='✗ 不正解。正しい答えは「'+target+'」でした。<br><small style="opacity:.8">'+q.text+'</small>';}
  document.getElementById('next-btn').classList.add('show');document.getElementById('score').textContent=score;
}
function nextBlank(){currentQ++;renderBlank();}

initFilters();showMenu();
</script>
</body>
</html>
